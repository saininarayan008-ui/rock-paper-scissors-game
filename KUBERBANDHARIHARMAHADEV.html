<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
                height: 100vh;
                background-color: azure;
                display: flex;
                justify-content: center;
                align-items: center;
        }
        .container{
            display: flex;
            flex-direction: column;
            max-width: 535px;
            width: 100%;
            padding: 2rem 5rem;
            border-radius: 14px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }
        .result_images{
            display: flex;
            justify-content: center;
            gap: 7rem;
        }
    </style>
</head>
<body>
        <section class="container">
            <!-- Result Display Section -->
             <div class="result-field">
                    <!-- container for  user and BOT result images-->
                     <div class="result_images">
                        <span class="user_result">
                            <img src="images/rock.png" alt="User's choice image" />
                        </span>
                        <span class="BOT_result">
                            <img src="images/rock.png" alt="BOT's choice image" /> 
                        </span>
                     </div>
                     <!--Display the game result images -->
                     <div class="result">Let's play!</div>
             </div>
                <!--option for users to choose from-->
                <div class="option_image">
                    <span class="option_image">
                        <img src="images/rock.png" alt="Rock image" />
                    </span>
                   <span class="option_image">
                    <img src="images/paper.png" alt="Paper image" />
                   </span> 
                  <span class="option_image">
                    <img src="images/scissors.png" alt="Scissors image" />
                  </span> 
             </div>
    </section>
</body>
</html>
